name: Auto-Sync Mutants

on:
  schedule:
    # Запуск каждый день в 16:30 МСК (13:30 UTC)
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-job:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 1. Клонирование репозитория
        uses: actions/checkout@v4

      - name: 2. Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Установка зависимостей
        run: npm ci

      - name: 4. Запуск Парсера (Режим FULL)
        run: npx tsx scripts/sync-mutants.ts full

      - name: 5. Проверка изменений
        id: check-changes
        run: |
          if git diff --quiet src/data/mutants/*.json public/textures_by_mutant/ 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Изменений не обнаружено"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Обнаружены изменения в данных"
          fi

      - name: 6. Сохранение изменений (Commit & Push)
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-Sync: Обновление данных мутантов"
          commit_user_name: "MGG Parser Bot"
          commit_user_email: "bot@archivist-library.com"
          commit_author: "MGG Parser Bot <bot@archivist-library.com>"
          branch: main
          file_pattern: 'src/data/mutants/*.json public/textures_by_mutant/**'

      - name: 7. Синхронизация текстур с Яндекс CDN
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          pip install awscli
          aws s3 sync public/textures_by_mutant/ s3://archivist-cdn-v2/textures_by_mutant/ \
            --endpoint-url https://storage.yandexcloud.net \
            --acl public-read \
            --delete \
            --exclude "*" \
            --include "*.webp"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YANDEX_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1

      - name: 8. Итоги работы
        if: always()
        run: |
          echo "## 📊 Итоги синхронизации" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **Статус:** Обнаружены изменения, данные обновлены" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **Статус:** Изменений не обнаружено" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 **Время запуска:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ **Режим парсера:** FULL (добавление новых мутантов)" >> $GITHUB_STEP_SUMMARY
