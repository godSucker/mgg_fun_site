name: Process Tier Updates

# Тиры обновляются вебхуком напрямую (src/pages/api/telegram-webhook.ts):
# бот получает файл -> tier-parser.js -> коммит mutants.json через GitHub API.
# Этот workflow — ручная заглушка на случай, если понадобится вмешаться.
#
# Расписание убрано намеренно: шаг ниже ничего не делает, а cron '0 */6 * * *'
# жёг ~1460 холостых прогонов в год. Прежний слепой `git add -A` тоже убран —
# он мог закоммитить посторонние файлы, оказавшиеся в рабочем дереве.
on:
  workflow_dispatch:

jobs:
  process-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Статус
        run: |
          echo "## ℹ️ Process Tier Updates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Тиры обновляются вебхуком напрямую, этот workflow — заглушка." >> $GITHUB_STEP_SUMMARY
          echo "Автоматических изменений здесь не производится." >> $GITHUB_STEP_SUMMARY
